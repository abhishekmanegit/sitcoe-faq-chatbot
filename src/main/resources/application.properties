server.port=8080

# IMPORTANT: never hardcode your real key here.
# Set it as an environment variable before running:
#   Windows (cmd):  set GROQ_API_KEY=your_key_here
#   Windows (ps):   $env:GROQ_API_KEY="your_key_here"
#   Mac/Linux:      export GROQ_API_KEY=your_key_here
groq.api.key=${GROQ_API_KEY}

# You can change the model here without touching Java code
groq.model=llama-3.3-70b-versatile
